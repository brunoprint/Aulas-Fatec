<!DOCTYPE html>
<html>
<head>
    <title>Tabelas</title>
</head>
<body>
    <!-- Tabela -->
    <!-- tr=linha  td=coluna -->
    <table border="1">
        <tr>
            <td>Celula 1</td>
            <td>Celula 2</td>
            <td>Celula 3</td>
        </tr>
        <tr>
            <td>Celula 4</td>
            <td>Celula 5</td>
            <td>Celula 6</td>
        </tr>
    </table>
    <br>
    <!-- Colspan(casas continuas horizontais) -->
    <table border="1">
        <tr>
            <td colspan="3">Celula 1</td>
        </tr>
        <tr>
            <td>Celula 4</td>
            <td>Celula 5</td>
            <td>Celula 6</td>
        </tr>
    </table>
    <br>
    <!-- Rowspan(casas continuas verticais) -->
    <table border="1">
        <tr>
            <td rowspan="3">Celula 1</td>
            <td>Cedula 2</td>
        </tr>
        <tr>
            <td>Celula 3</td>
        </tr>
        <tr>
            <td>Cedula 4</td>
        </tr>
    </table>

</body>
</html>
